version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: ./...
    # CGO is controlled by the CGO_ENABLED environment variable
    # - Local macOS builds: CGO_ENABLED=0 (cross-compilation)
    # - GitHub Actions: CGO_ENABLED=1 (native Linux build with PAM support)
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # linux_arm64 excluded because PAM (libpam) doesn't support ARM64
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-
    ---
    Released by [GoReleaser](https://github.com).
