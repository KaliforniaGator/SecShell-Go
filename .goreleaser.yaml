version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: ./...
    # Default to CGO disabled for easier cross-compilation
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Enable CGO specifically for Linux to support libpam
    overrides:
      - goos: linux
        env:
          - CGO_ENABLED=1

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-
    ---
    Released by [GoReleaser](https://github.com).
